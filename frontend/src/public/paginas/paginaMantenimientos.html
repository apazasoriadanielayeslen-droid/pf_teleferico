<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Área de Mantenimiento - Mi Teleférico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom right, #064e3b, #0f766e, #14b8a6); }
  </style>
</head>
<body class="min-h-screen text-white flex">

  <!-- barra lateral (reusar mismo HTML compartido con supervisor) -->
  <aside class="w-64 bg-teal-950/70 backdrop-blur-md border-r border-teal-700/50 flex flex-col sticky top-0 h-screen overflow-y-auto">
    <div class="p-6 border-b border-teal-700/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-white">MT</div>
        <div>
          <h1 class="text-xl font-bold">Mi Teleférico</h1>
          <p class="text-sm text-teal-300">Panel Supervisor</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
      <a href="dashboardSupervisor.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition hover:bg-teal-800/40">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Pantalla Principal
      </a>
      <a href="paginaMantenimientos.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition hover:bg-teal-800/40">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        Mantenimientos
      </a>
      <a href="paginaCabinasSupervisor.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition hover:bg-teal-800/40">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Cabinas
      </a>
    </nav>

    <div class="p-6 border-t border-teal-700/50 mt-auto">
      <button id="btnLogout" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/60 hover:bg-red-800/70 rounded-lg text-red-200 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <header class="bg-teal-950/50 backdrop-blur-md border-b border-teal-700/40 sticky top-0 z-40">
      <div class="max-w-full px-6 py-4 flex justify-between items-center">
        <div>
          <p class="font-medium">Bienvenido, <span id="nombreUsuario" class="text-teal-300"></span></p>
          <p class="text-sm text-teal-300">Rol: <span id="rolUsuario"></span></p>
        </div>
        <div class="flex items-center gap-6">
          <button id="btnNotifications" class="relative text-teal-200 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
            <span id="badgeNotifications" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5">0</span>
          </button>
          <div id="notificationsDropdown" class="absolute top-12 right-0 mt-2 w-96 bg-white text-black rounded-lg shadow-lg hidden z-50 max-h-96 overflow-y-auto">
            <div class="p-4">
              <h3 class="font-bold mb-2">Notificaciones</h3>
              <div id="notificationsList" class="space-y-2"></div>
            </div>
          </div>
          <button id="btnUser" class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center font-bold text-white hover:bg-teal-500 transition">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="p-6 max-w-7xl mx-auto space-y-8">
      <!-- filtro de fecha y búsqueda -->
      <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
        <div class="flex items-center gap-2">
          <button id="btnDia" class="px-4 py-2 bg-teal-600 rounded-lg">Día</button>
          <button id="btnSemana" class="px-4 py-2 bg-teal-600 rounded-lg">Semana</button>
          <button id="btnMes" class="px-4 py-2 bg-teal-600 rounded-lg">Mes</button>
          <button id="btnAño" class="px-4 py-2 bg-teal-600 rounded-lg">Año</button>
          <span id="fechaActual" class="ml-4 font-medium"></span>
        </div>
        <div class="flex items-center gap-2">
          <input id="searchInput" type="text" placeholder="Buscar mantenimiento..." class="w-full md:w-64 bg-white/10 border border-white/20 rounded-xl px-4 py-2 focus:outline-none focus:border-teal-400 placeholder-gray-400">
          <button id="btnSearch" class="bg-cyan-600 hover:bg-cyan-700 px-4 py-2 rounded-lg">Buscar</button>
        </div>
        <button id="btnNew" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg">+ Programar Mantenimiento</button>
      </div>

      <!-- tarjetas resumen -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-5 text-center cursor-pointer hover:bg-white/20 transition-colors" id="cardAbiertos">
          <p class="text-sm text-gray-300">Abiertos</p>
          <p id="countAbiertos" class="text-3xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-5 text-center cursor-pointer hover:bg-white/20 transition-colors" id="cardPendientes">
          <p class="text-sm text-gray-300">Pendientes</p>
          <p id="countPendientes" class="text-3xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-5 text-center cursor-pointer hover:bg-white/20 transition-colors" id="cardEnProceso">
          <p class="text-sm text-gray-300">En Proceso</p>
          <p id="countEnProceso" class="text-3xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-5 text-center cursor-pointer hover:bg-white/20 transition-colors" id="cardCompletadosHoy">
          <p class="text-sm text-gray-300">Completados Hoy</p>
          <p id="countCompletadosHoy" class="text-3xl font-bold mt-1">0</p>
        </div>
      </div>

      <!-- lista de mantenimientos desplegable se agregará dinámicamente -->
      <div id="sectionConteos"></div>
      <!-- contenedor fijo de mantenimientos próximos -->
      <div id="proximosContainer" class="mt-8"></div>

    </div>

    <!-- formulario emergente -->
    <div id="modalForm" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50">
      <div class="bg-white text-black rounded-xl w-full max-w-xl p-6 relative">
        <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-black">✖</button>
        <h2 class="text-xl font-bold mb-4">+ Programar Mantenimiento</h2>
        <form id="maintForm" class="space-y-4">
          <input type="hidden" id="inpIncidenteId" />
          <div>
            <label class="block">Título de la tarea</label>
            <input id="inpTitulo" type="text" class="w-full border rounded px-3 py-2" required />
          </div>
          <div>
            <label class="block">Tipo de Mantenimiento</label>
            <select id="inpTipo" class="w-full border rounded px-3 py-2" required>
              <option value="">-- seleccionar --</option>
              <option value="PREVENTIVO">PREVENTIVO</option>
              <option value="CORRECTIVO">CORRECTIVO</option>
            </select>
          </div>
          <div>
            <label class="block">Estacion</label>
            <select id="inpEstacion" class="w-full border rounded px-3 py-2" required></select>
          </div>
          <div>
            <label class="block">Cabina</label>
            <input id="inpCabina" type="text" list="cabinasList" class="w-full border rounded px-3 py-2" required />
            <datalist id="cabinasList"></datalist>
          </div>
          <div>
            <label class="block">Fecha Programada</label>
            <input id="inpFecha" type="date" class="w-full border rounded px-3 py-2" required />
          </div>
          <div>
            <label class="block">Hora Programada</label>
            <input id="inpHora" type="time" class="w-full border rounded px-3 py-2" required />
          </div>
          <div>
            <label class="block">Técnico Asignado</label>
            <select id="inpTecnico" class="w-full border rounded px-3 py-2"></select>
          </div>
          <div>
            <label class="block">Descripción del trabajo</label>
            <textarea id="inpDescripcion" class="w-full border rounded px-3 py-2" required></textarea>
          </div>
          <div class="flex items-center gap-4">
            <label><input id="chkNotify" type="checkbox" /> Notificar al técnico por email</label>
            <label><input id="chkReminder" type="checkbox" /> Enviar recordatorio 1 día antes</label>
          </div>
          <div class="flex justify-end gap-2">
            <button type="button" id="btnCancel" class="px-4 py-2 bg-gray-300 rounded">Cancelar</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Programar Mantenimiento</button>
          </div>
        </form>
      </div>
    </div>

    <!-- modal ver detalle incidente -->
    <div id="modalDetalleIncidente" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50">
      <div class="bg-white text-black rounded-xl w-full max-w-lg p-6 relative">
        <button id="closeDetalleIncidente" class="absolute top-4 right-4 text-gray-500 hover:text-black">✖</button>
        <h2 class="text-xl font-bold mb-4">Detalle del Incidente</h2>
        <div id="detalleIncidenteContent" class="space-y-2"></div>
      </div>
    </div>

    <!-- modal editar mantenimiento -->
    <div id="modalEditarMantenimiento" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50">
      <div class="bg-white text-black rounded-xl w-full max-w-xl p-6 relative">
        <button id="closeEditarMantenimiento" class="absolute top-4 right-4 text-gray-500 hover:text-black">✖</button>
        <h2 class="text-xl font-bold mb-4">Editar Mantenimiento</h2>
        <form id="editMaintForm" class="space-y-4">
          <!-- similar al form principal -->
        </form>
      </div>
    </div>
  </main>

  <script src="../js/mantenimientoSupervisor.js"></script>
</body>
</html>
