<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Teleférico - Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom right, #1e3a8a, #4f46e5, #6d28d9); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-white/20 shadow-2xl">

    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white">Mi Teleférico</h1>
      <p class="text-gray-300 mt-2">Panel de Gestión</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-900/60 border border-red-600 text-red-100 px-4 py-3 rounded-lg mb-6 text-center"></div>
    <div id="successMsg" class="hidden bg-green-900/60 border border-green-600 text-green-100 px-4 py-3 rounded-lg mb-6 text-center"></div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1.5">Correo electrónico</label>
        <input id="correo" type="email" required autocomplete="email"
               class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/30"
               placeholder="tu@correo.bo" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1.5">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-500/30"
               placeholder="••••••••" />
      </div>

      <button id="btnLogin" type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-lg transition disabled:opacity-60 flex items-center justify-center gap-3">
        <span id="btnText">Iniciar Sesión</span>
        <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

      <div class="mt-4 text-center">
        <p class="text-gray-300 text-sm">
          ¿No tienes cuenta? 
          <a href="./registro.html" class="text-indigo-400 hover:text-indigo-300 font-medium">
            Regístrate aquí
          </a>
        </p>
      </div>
    </form>

    <p class="mt-6 text-center text-sm text-gray-300">
      ¿Olvidaste tu contraseña? Contacta a sistemas
    </p>

  </div>

  <script src="../js/login.js"></script>   <!-- ajusta la ruta si está en otra carpeta -->
</body>
</html>
