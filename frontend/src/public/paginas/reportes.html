<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes - Mi Teleférico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom right, #064e3b, #0f766e, #14b8a6); }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="flex min-h-screen">

    <!-- Menú lateral -->
    <aside class="w-64 bg-teal-950/70 backdrop-blur-md border-r border-teal-700/50 flex flex-col sticky top-0 h-screen overflow-y-auto">
      <div class="p-6 border-b border-teal-700/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-white">MT</div>
          <div>
            <h1 class="text-xl font-bold">Mi Teleférico</h1>
            <p class="text-sm text-teal-300">Panel Administrador</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="dashboardAdmin.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🏠 Dashboard</a>
        <a href="registro.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">👤 Gestión de Usuarios</a>
        <a href="roles.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🛡️ Roles</a>
        <a href="estaciones.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🚉 Estaciones</a>
        <a href="cabinas.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🚠 Cabinas</a>
        <a href="reportes.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition bg-teal-800">📊 Reportes</a>
      </nav>

      <div class="p-6 border-t border-teal-700/50 mt-auto">
        <button id="btnLogout"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/60 hover:bg-red-800/70 rounded-lg text-red-200 hover:text-white transition">
          🔒 Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- Contenido principal -->
    <main class="flex-1 overflow-y-auto">
      <!-- Header superior -->
      <header class="bg-teal-950/50 backdrop-blur-md border-b border-teal-700/40 sticky top-0 z-40">
        <div class="max-w-full px-6 py-4 flex justify-between items-center">
          <h1 class="text-3xl font-bold mb-6">📊 Reportes del Sistema</h1>
        </div>
      </header>

      <!-- Contenido -->
      <div class="p-6 max-w-7xl mx-auto">
        <!-- Estado operativo -->
  <section class="mb-8">
    <h2 class="text-xl font-bold mb-2">1. Estado Operativo en Tiempo Real</h2>
    <button onclick="cargarEstadoOperativo()" class="bg-green-600 px-4 py-2 rounded">Actualizar</button>
    <div id="estadoOperativo" class="mt-4"></div>
  </section>

  <!-- Flujo por rango horario -->
  <section class="mb-8">
    <h2 class="text-xl font-bold mb-2">2. Flujo por Rango Horario</h2>
    <form onsubmit="cargarFlujo(event)" class="space-x-2">
      <input type="datetime-local" id="flujoInicio" required>
      <input type="datetime-local" id="flujoFin" required>
      <button type="submit" class="bg-blue-600 px-4 py-2 rounded">Generar</button>
    </form>
    <div id="reporteFlujo" class="mt-4"></div>
  </section>

  <button id="descargarFlujo">Descargar PDF</button>

  <!-- Historial de incidentes -->
  <section class="mb-8">
    <h2 class="text-xl font-bold mb-2">3. Historial de Incidentes</h2>
    <form onsubmit="cargarIncidentes(event)" class="space-x-2">
      <input type="date" id="incidentesInicio" required>
      <input type="date" id="incidentesFin" required>
      <button type="submit" class="bg-red-600 px-4 py-2 rounded">Generar</button>
    </form>
    <div id="reporteIncidentes" class="mt-4"></div>
  </section>

  <button id="descargarIncidentes">Descargar PDF</button>

  <!-- Mantenimientos -->
  <section class="mb-8">
    <h2 class="text-xl font-bold mb-2">4. Mantenimientos Vencidos o Próximos</h2>
    <form onsubmit="cargarMantenimientos(event)" class="space-x-2">
      <input type="date" id="mantenimientoInicio" required>
      <input type="date" id="mantenimientoFin" required>
      <button type="submit" class="bg-yellow-600 px-4 py-2 rounded">Generar</button>
    </form>
    <div id="reporteMantenimientos" class="mt-4"></div>
  </section>

    <button id="descargarMantenimientos">Descargar PDF</button>
      </div>
    </main>
  </div>

  <script src="../js/reportes.js"></script>
</body>
</html>
