<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Administrador - Mi Teleférico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom right, #064e3b, #0f766e, #14b8a6); }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="flex min-h-screen">

    <!-- Menú lateral -->
    <aside class="w-64 bg-teal-950/70 backdrop-blur-md border-r border-teal-700/50 flex flex-col sticky top-0 h-screen overflow-y-auto">
      <div class="p-6 border-b border-teal-700/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-white">MT</div>
          <div>
            <h1 class="text-xl font-bold">Mi Teleférico</h1>
            <p class="text-sm text-teal-300">Panel Administrador</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="dashboardAdmin.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🏠 Dashboard</a>
        <a href="registro.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">👤 Gestión de Usuarios</a>
        <a href="roles.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🛡️ Roles</a>
        <a href="telestaciones.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🚉 Estaciones</a>
        <a href="cabinas.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">🚠 Cabinas</a>
        <a href="reportes.html" class="menu-link flex items-center gap-3 px-4 py-3 rounded-lg transition">📊 Reportes</a>
      </nav>

      <div class="p-6 border-t border-teal-700/50 mt-auto">
        <button id="btnLogout"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/60 hover:bg-red-800/70 rounded-lg text-red-200 hover:text-white transition">
          🔒 Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- Contenido principal -->
    <main class="flex-1 overflow-y-auto">

      <!-- Header superior con usuario -->
      <header class="bg-teal-950/50 backdrop-blur-md border-b border-teal-700/40 sticky top-0 z-40">
        <div class="max-w-full px-6 py-4 flex justify-between items-center">
          <h1 class="text-3xl font-bold">Panel de Administración</h1>

          <div class="flex items-center gap-4">
            <!-- Notificaciones -->
            <button class="relative text-teal-200 hover:text-white transition">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5">3</span>
            </button>

            <!-- Usuario -->
            <div class="flex items-center gap-3">
              <div class="text-right">
                <p class="font-medium">Bienvenid@, <span id="nombreUsuario" class="text-teal-300"></span></p>
                <p class="text-sm text-teal-300" id="rolUsuario"></p>
              </div>
              <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center font-bold">AD</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Contenido -->
      <div class="p-6 max-w-7xl mx-auto">

        <!-- Tarjetas estadísticas -->
        <div id="stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>

        <!-- Reportes rápidos -->
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-6">
          <h3 class="text-2xl font-semibold mb-6">Resumen del Sistema</h3>
          <div id="flujoStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/dashboardAdmin.js"></script>
</body>
</html>
