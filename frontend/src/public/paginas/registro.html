<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Mi Teleférico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(to bottom right, #1e3a8a, #4f46e5, #7c3aed);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-lg bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-white/20 shadow-2xl">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Registro de Usuario</h1>
      <p class="text-gray-300 mt-2">Sistema de Gestión - Mi Teleférico</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-900/60 border border-red-600 text-red-100 px-4 py-3 rounded-lg mb-6 text-center"></div>
    <div id="successMsg" class="hidden bg-green-900/60 border border-green-600 text-green-100 px-4 py-3 rounded-lg mb-6 text-center"></div>

    <form id="registerForm" class="space-y-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-200 mb-1">Nombres *</label>
          <input id="nombres" type="text" required class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-200 mb-1">Apellido Paterno *</label>
          <input id="apellido1" type="text" required class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">Apellido Materno</label>
        <input id="apellido2" type="text" class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-200 mb-1">C.I. (ej: 1234567LP) *</label>
          <input id="ci" type="text" required class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-200 mb-1">Teléfono</label>
          <input id="telefono" type="tel" class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">Correo electrónico *</label>
        <input id="correo" type="email" required class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">Contraseña * (mínimo 6 caracteres)</label>
        <input id="contrasena" type="password" required minlength="6" class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-indigo-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">Rol *</label>
        <select id="id_rol" required class="w-full px-4 py-3 bg-white/10 border border-white/30 rounded-lg text-white focus:outline-none focus:border-indigo-400">
          <option value="" disabled selected>Cargando roles...</option>
        </select>
      </div>

      <button id="btnSubmit" type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3.5 rounded-lg transition disabled:opacity-60 flex justify-center items-center gap-3 mt-4">
        <span id="btnText">Registrar</span>
        <svg id="loading" class="hidden animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>

      <p class="text-center text-gray-300 mt-6">
        <a href="./login.html" class="text-indigo-300 hover:text-indigo-200">← Volver al inicio de sesión</a>
      </p>
    </form>
  </div>

  <script src="../js/registro.js"></script>
</body>
</html>
